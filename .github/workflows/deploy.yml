name: Deploy QSA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Deployment path to use
        required: true
        default: self-hosted
        type: choice
        options:
          - self-hosted
          - ssh-fallback

jobs:
  deploy-self-hosted:
    name: Deploy on QSA VPS runner
    if: github.event_name == 'push' || inputs.deploy_mode == 'self-hosted'
    runs-on:
      - self-hosted
      - qsa
    timeout-minutes: 20

    steps:
      - name: Run local VPS deploy script
        run: /home/alphaver/deploy-qsa.sh

  verify-legacy-import:
    name: Verify legacy import readiness
    needs: deploy-self-hosted
    if: github.event_name == 'push' || inputs.deploy_mode == 'self-hosted'
    runs-on:
      - self-hosted
      - qsa
    timeout-minutes: 10

    steps:
      - name: Run safe VPS verification commands
        run: |
          set -euo pipefail

          cd /home/alphaver/public_html/quick-seo-analysis

          PHP="/opt/cpanel/ea-php83/root/usr/bin/php"
          COMPOSER="/usr/local/bin/composer"

          echo "CURRENT_DEPLOYED_COMMIT=$(git rev-parse HEAD)"
          "$PHP" artisan optimize:clear
          "$PHP" "$COMPOSER" dump-autoload
          "$PHP" artisan migrate --force
          "$PHP" artisan list | grep qsa
          "$PHP" artisan qsa:inspect-legacy-dotnet
          "$PHP" artisan qsa:import-legacy-dotnet --dry-run

  deploy-ssh-fallback:
    name: Deploy through SSH fallback
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'ssh-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Run VPS deploy script over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            /home/alphaver/deploy-qsa.sh
